<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Campainha Digital</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      // This script checks to see if a redirect is present in the query string,
      // converts it back into a correct url and adds it to the
      // browser's history using window.history.replaceState(...),
      // which will cause the browser to look like it's at the correct url
      // and then redirects the browser to that url.
      var l = window.location;
      if (l.search[1] === '/' ) {
        var decoded = l.search.slice(1).split('&').map(function(s) { 
          return s.replace(/~and~/g, '&')
        }).join('?');
        window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
        );
      }

      // Redirecionamento básico se acessado via subpath sem o hack acima configurado no index
      var segmentCount = 1; // Ajuste se o repo estiver em um sub-sub diretorio
      var path = l.pathname.split('/');
      if (path.length > segmentCount && !path.includes('index.html')) {
        l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/' + path[1] + '/index.html?/' + path.slice(segmentCount + 1).join('/') + (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') + l.hash);
      }
    </script>
  </head>
  <body>
    Redirecionando...
  </body>
</html>
