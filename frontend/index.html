<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Campainha Digital</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <script type="text/javascript">
      // Script para lidar com o redirecionamento do 404.html no GitHub Pages
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
    <!-- Mercado Pago SDK -->
    <script src="https://sdk.mercadopago.com/js/v2"></script>
  </head>
  <body>
    <div id="root">
      <div style="min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0F172A; font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif; color: #FFFFFF;">
        <div style="margin-bottom: 24px; position: relative;">
          <div style="width: 72px; height: 72px; border: 4px solid rgba(0, 229, 255, 0.1); border-top-color: #00E5FF; border-radius: 50%; animation: spin 1s linear infinite;"></div>
        </div>
        <h2 style="font-size: 20px; font-weight: 800; letter-spacing: -0.5px; margin: 0 0 8px 0; color: #FFFFFF;">Campainha Digital</h2>
        <p style="font-size: 13px; color: #94A3B8; margin: 0;">Carregando sistema seguro...</p>
        <style>
          @keyframes spin {
            to { transform: rotate(360deg); }
          }
        </style>
      </div>
    </div>
    <script type="module" src="src/main.jsx"></script>
  </body>
</html>
