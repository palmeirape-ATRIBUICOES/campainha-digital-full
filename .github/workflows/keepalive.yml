name: Keep Render Backend Alive
on:
  schedule:
    - cron: '*/5 * * * *' # Run every 5 minutes
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend
        run: |
          curl -f https://campainha-backend.onrender.com/api/ping || echo "Backend ping failed"
      - name: Ping Frontend
        run: |
          curl -f https://campainha-frontend.onrender.com || echo "Frontend ping failed"
