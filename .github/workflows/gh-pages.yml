name: Deploy
on: [push]
jobs:
  deploy:
      runs-on: ubuntu-latest    permissions:
            contents: read
                  pages: write
                        id-token: write
                            steps:
                                  - uses: actions/checkout@v4
                                          with:
                                                    submodules: false
                                                          - uses: actions/setup-node@v4
                                                                  with:
                                                                            node-version: 20
                                                                                  - run: cd frontend && npm install && npm run build
                                                                                        - uses: actions/upload-pages-artifact@v3
                                                                                                with:
                                                                                                          path: ./frontend/dist
                                                                                                                - uses: actions/deploy-pages@v4
                                                                                                                
