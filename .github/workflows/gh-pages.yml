name: Deploy
on:
  push:
      branches: ["main"]
      permissions:
        contents: read
          pages: write
            id-token: write
            jobs:
              build:
                  runs-on: ubuntu-latest
                      steps:
                            - uses: actions/checkout@v4
                                    with:
                                              submodules: false
                                                    - uses: actions/setup-node@v4
                                                            with:
                                                                      node-version: 20
                                                                            - run: |
                                                                                      cd frontend
                                                                                                npm install
                                                                                                          npm run build
                                                                                                                - uses: actions/upload-pages-artifact@v3
                                                                                                                        with:
                                                                                                                                  path: './frontend/dist'
                                                                                                                                    deploy:
                                                                                                                                        runs-on: ubuntu-latest
                                                                                                                                            needs: build
                                                                                                                                                steps:
                                                                                                                                                      - id: deployment
                                                                                                                                                              uses: actions/deploy-pages@v4
                                                                                                                                                              
